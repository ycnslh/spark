version: '3.8'

services:
  spark:
    build: .
    container_name: spark
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - PORT=8085
      - LOG_LEVEL=info
      - AUTH_USER=${AUTH_USER:-}
      - AUTH_PASS=${AUTH_PASS:-}
      - WAKE_RATE_LIMIT=10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
