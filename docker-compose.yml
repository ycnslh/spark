services:
  spark:
    build: .
    container_name: spark
    restart: unless-stopped
    network_mode: host
    volumes:
      # Persiste la base SQLite entre les redéploiements.
      # Le dossier ./data est créé sur l'hôte au premier démarrage.
      - ./data:/app/data
    environment:
      - PORT=8085
      - LOG_LEVEL=info
      - AUTH_USER=${AUTH_USER:-}
      - AUTH_PASS=${AUTH_PASS:-}
      - WAKE_RATE_LIMIT=10
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
